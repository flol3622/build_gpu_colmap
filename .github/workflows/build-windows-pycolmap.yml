name: Build Required Windows pycolmap Wheel

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-wheels:
    name: CPython 3.12 CUDA 12.8 + cuDSS
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            python-version: '3.12'
            cuda: true
            cudss: true
            cuda_version: '12.8.1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply pycolmap Caspar bindings patch
        shell: bash
        run: |
          PATCH_FILE="${GITHUB_WORKSPACE}/patches/pycolmap-caspar-bindings.patch"
          if git -C third_party/colmap-for-pycolmap apply --check "$PATCH_FILE"; then
            git -C third_party/colmap-for-pycolmap apply "$PATCH_FILE"
            echo "pycolmap Caspar bindings patch applied"
          elif git -C third_party/colmap-for-pycolmap apply --reverse --check "$PATCH_FILE"; then
            echo "pycolmap Caspar bindings patch already applied"
          elif git -C third_party/colmap-for-pycolmap grep -q "BundleAdjustmentBackend::CASPAR" -- src/pycolmap/estimators/bundle_adjustment.cc; then
            echo "Upstream already provides Caspar pycolmap bindings; skipping obsolete patch"
          else
            echo "ERROR: pycolmap Caspar bindings patch does not apply and upstream Caspar bindings not found"
            exit 1
          fi

      - name: Apply pycolmap NVIDIA runtime preloader patch
        shell: bash
        run: |
          PATCH_FILE="${GITHUB_WORKSPACE}/patches/pycolmap-nvidia-runtime-preload.patch"
          if git -C third_party/colmap-for-pycolmap apply --check "$PATCH_FILE"; then
            git -C third_party/colmap-for-pycolmap apply "$PATCH_FILE"
            echo "pycolmap NVIDIA runtime preloader patch applied"
          elif git -C third_party/colmap-for-pycolmap apply --reverse --check "$PATCH_FILE"; then
            echo "pycolmap NVIDIA runtime preloader patch already applied"
          elif git -C third_party/colmap-for-pycolmap grep -q "nvidia.cudnn" -- python/pycolmap/__init__.py; then
            echo "Upstream already preloads NVIDIA runtime packages"
          else
            echo "ERROR: pycolmap NVIDIA runtime preloader patch cannot be applied"
            exit 1
          fi

      - name: Fetch vcpkg history for baseline
        run: git -C third_party/vcpkg fetch --unshallow || true
        shell: bash

      # ==================== Python Setup ====================
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel scikit-build-core[pyproject] "pybind11>=3.0.2" delvewheel

      # ==================== CUDA Setup ====================
      - name: Install CUDA Toolkit (Windows, CUDA 12.x)
        if: matrix.cuda && runner.os == 'Windows' && !startsWith(matrix.cuda_version, '13.')
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ matrix.cuda_version }}
          method: 'network'
          sub-packages: '["nvcc", "nvtx", "cudart", "curand", "curand_dev", "nvrtc", "nvrtc_dev", "nvjitlink", "cublas", "cublas_dev", "cusparse", "cusparse_dev", "cusolver", "cusolver_dev", "cufft", "cufft_dev"]'
          use-github-cache: false
          log-file-suffix: '-windows-py${{ matrix.python-version }}-cuda${{ matrix.cuda_version }}.log'

      # ==================== cuDSS Setup ====================
      - name: Install cuDSS (Windows)
        if: matrix.cuda && matrix.cudss && runner.os == 'Windows'
        shell: pwsh
        run: |
          $cudaVersion = "${{ matrix.cuda_version }}"
          $cudaMajor = $cudaVersion.Split('.')[0]

          Write-Host "Downloading cuDSS for CUDA $cudaMajor..."
          $cudssUrl = "https://developer.download.nvidia.com/compute/cudss/redist/libcudss/windows-x86_64/libcudss-windows-x86_64-0.7.1.4_cuda${cudaMajor}-archive.zip"

          Invoke-WebRequest -Uri $cudssUrl -OutFile cudss.zip -UseBasicParsing
          Expand-Archive cudss.zip -DestinationPath "C:/cudss"

          $cudssPath = Get-ChildItem -Path "C:/cudss" -Directory | Select-Object -First 1
          Write-Host "cuDSS installed at: $($cudssPath.FullName)"
          echo "CUDSS_ROOT=$($cudssPath.FullName)" >> $env:GITHUB_ENV

          # Find cudss_DIR (CMake config location)
          $cudssDir = "$($cudssPath.FullName)/lib/$cudaMajor/cmake/cudss"
          if (-not (Test-Path $cudssDir)) {
            $cudssDir = "$($cudssPath.FullName)/lib/cmake/cudss"
          }
          Write-Host "cudss_DIR: $cudssDir"
          echo "cudss_DIR=$cudssDir" >> $env:GITHUB_ENV

      # ==================== Build Tools ====================
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y

      # Setup MSVC environment so cl.exe is in PATH for CUDA/vcpkg builds
      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ==================== Compiler Caching ====================
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ccache-pycolmap-${{ matrix.os }}-${{ matrix.cuda && 'cuda' || 'cpu' }}-py${{ matrix.python-version }}
          max-size: 2G

      # ==================== vcpkg Setup ====================
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/third_party/vcpkg'
          vcpkgJsonGlob: 'vcpkg.json'
        env:
          VCPKG_BINARY_SOURCES: 'clear;default,readwrite'

      # ==================== Build COLMAP-for-pycolmap ====================
      - name: Build COLMAP-for-pycolmap (Windows)
        if: runner.os == 'Windows'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 240
          max_attempts: 3
          retry_wait_seconds: 30
          shell: pwsh
          command: |
            $cudaFlag = if ("${{ matrix.cuda }}" -eq "true") { "ON" } else { "OFF" }
            $cudssFlag = if ("${{ matrix.cudss }}" -eq "true") { "ON" } else { "OFF" }
            $casparFlag = if ("${{ matrix.cuda }}" -eq "true") { "ON" } else { "OFF" }

            Write-Host "Building COLMAP-for-pycolmap with CUDA=$cudaFlag cuDSS=$cudssFlag Caspar=$casparFlag"

            # Create build directory
            New-Item -ItemType Directory -Force -Path build | Out-Null
            Set-Location build

            # Configure
            $vcpkgToolchain = "${{ github.workspace }}/third_party/vcpkg/scripts/buildsystems/vcpkg.cmake"

            # Build cmake args
            $cmakeArgs = @(
              "-G", "Ninja",
              "-DCMAKE_TOOLCHAIN_FILE=$vcpkgToolchain",
              "-DCMAKE_BUILD_TYPE=Release",
              "-DCUDA_ENABLED=$cudaFlag",
              "-DCASPAR_ENABLED=$casparFlag",
              "-DDOWNLOAD_ENABLED=ON",
              "-DBUILD_COLMAP=OFF",
              "-DBUILD_COLMAP_FOR_PYCOLMAP=ON"
            )

            if ("${{ matrix.cuda }}" -eq "true") {
              $cudaRoot = $env:CUDA_PATH
              if (-not $cudaRoot) {
                $versionParts = "${{ matrix.cuda_version }}".Split(".")
                $cudaMajorMinor = "$($versionParts[0]).$($versionParts[1])"
                $cudaRoot = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$cudaMajorMinor"
              }

              $cudaCompiler = Join-Path $cudaRoot "bin\nvcc.exe"
              if (-not (Test-Path $cudaCompiler)) {
                Write-Host "ERROR: CUDA compiler not found at $cudaCompiler" -ForegroundColor Red
                exit 1
              }

              $cudaRoot = $cudaRoot.Replace('\', '/')
              $cudaCompiler = $cudaCompiler.Replace('\', '/')
              Write-Host "Using CUDA root: $cudaRoot"
              Write-Host "Using CUDA compiler: $cudaCompiler"
              $cmakeArgs += "-DCMAKE_CUDA_COMPILER=$cudaCompiler"
              $cmakeArgs += "-DCUDAToolkit_ROOT=$cudaRoot"
              $cmakeArgs += "-DCUDA_TOOLKIT_ROOT_DIR=$cudaRoot"
            }

            # Add cuDSS paths if enabled
            if ("${{ matrix.cudss }}" -eq "true" -and $env:cudss_DIR) {
              Write-Host "Adding cuDSS from: $env:cudss_DIR"
              $cmakeArgs += "-Dcudss_DIR=$env:cudss_DIR"
            }

            cmake .. @cmakeArgs `
              -DBUILD_CERES=ON `
              -DGFLAGS_USE_TARGET_NAMESPACE=ON

            # Build
            cmake --build . --config Release --parallel

            $colmapConfig = "${{ github.workspace }}/build/install/colmap-for-pycolmap/share/colmap/colmap-config.cmake"
            if (-not (Test-Path $colmapConfig)) {
              Write-Host "ERROR: Installed COLMAP CMake package is missing" -ForegroundColor Red
              exit 1
            }
            if (-not (Select-String -Path $colmapConfig -Pattern '^set\(DOWNLOAD_ENABLED (ON|TRUE|1)\)$' -Quiet)) {
              Write-Host "ERROR: COLMAP silently disabled DOWNLOAD_ENABLED" -ForegroundColor Red
              exit 1
            }

      - name: Verify Caspar export for pycolmap COLMAP (Windows)
        if: matrix.cuda && runner.os == 'Windows'
        shell: pwsh
        run: |
          $targets = "build/install/colmap-for-pycolmap/share/colmap/colmap-targets.cmake"
          $header = "build/install/colmap-for-pycolmap/include/colmap/thirdparty/Symforce-Caspar/generated/f32/solver.h"

          if (-not (Test-Path $targets)) {
            Write-Host "ERROR: COLMAP targets file not found at $targets" -ForegroundColor Red
            exit 1
          }
          if (-not (Select-String -Path $targets -Pattern "caspar_lib_core" -Quiet)) {
            Write-Host "ERROR: Caspar target is missing from COLMAP-for-pycolmap export" -ForegroundColor Red
            exit 1
          }
          if (-not (Test-Path $header)) {
            Write-Host "ERROR: Caspar generated headers were not installed at $header" -ForegroundColor Red
            exit 1
          }
          Write-Host "Caspar export for pycolmap COLMAP verified" -ForegroundColor Green

      # ==================== Build Python Wheel ====================
      - name: Stamp wheel metadata version
        shell: bash
        run: |
          python .github/scripts/stamp_pycolmap_wheel.py \
            third_party/colmap-for-pycolmap/pyproject.toml \
            --version "4.1.0+cu128.pipcuda.cudss" \
            --external-nvidia-runtime \
            --with-cudss

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: third_party/colmap-for-pycolmap
        run: |
          # Get paths
          $vcpkgToolchain = "${{ github.workspace }}/third_party/vcpkg/scripts/buildsystems/vcpkg.cmake".Replace('\', '/')
          $vcpkgInstalled = "${{ github.workspace }}/build/vcpkg_installed".Replace('\', '/')
          $colmapInstall = "${{ github.workspace }}/build/install/colmap-for-pycolmap".Replace('\', '/')
          $ceresInstall = "${{ github.workspace }}/build/install/ceres".Replace('\', '/')
          $pybind11Dir = (python -c "import pybind11; print(pybind11.get_cmake_dir())").Replace('\', '/')

          $cmakePrefixPath = "${colmapInstall};${ceresInstall};${pybind11Dir}"

          Write-Host "CMAKE_TOOLCHAIN_FILE: $vcpkgToolchain"
          Write-Host "VCPKG_INSTALLED_DIR: $vcpkgInstalled"
          Write-Host "CMAKE_PREFIX_PATH: $cmakePrefixPath"
          Write-Host "Note: CUDA_ENABLED=OFF for wheel build (uses pre-built CUDA-enabled COLMAP)"

          # Build wheel - CUDA_ENABLED=OFF because we link against pre-built COLMAP
          # The COLMAP library already has CUDA support, wheel doesn't compile CUDA code
          # For CUDA builds: Use Ninja generator with CMAKE_CUDA_COMPILER since VS generator
          # requires CUDA Visual Studio toolset integration which isn't reliably available
          $cudaArgs = @()
          if ("${{ matrix.cuda }}" -eq "true") {
            $cudaRoot = $env:CUDA_PATH
            if (-not $cudaRoot) {
              $versionParts = "${{ matrix.cuda_version }}".Split(".")
              $cudaMajorMinor = "$($versionParts[0]).$($versionParts[1])"
              $cudaRoot = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$cudaMajorMinor"
            }

            $cudaCompiler = Join-Path $cudaRoot "bin\nvcc.exe"
            if (-not (Test-Path $cudaCompiler)) {
              Write-Host "ERROR: CUDA compiler not found at $cudaCompiler" -ForegroundColor Red
              exit 1
            }

            $cudaRoot = $cudaRoot.Replace('\', '/')
            $cudaCompiler = $cudaCompiler.Replace('\', '/')
            Write-Host "Setting CMAKE_CUDA_COMPILER: $cudaCompiler"
            Write-Host "Setting CUDAToolkit_ROOT: $cudaRoot"
            Write-Host "Using Ninja generator to avoid VS CUDA toolset requirement"
            $cudaArgs = @(
              "--config-settings=cmake.define.CMAKE_CUDA_COMPILER=${cudaCompiler}",
              "--config-settings=cmake.define.CUDAToolkit_ROOT=${cudaRoot}",
              "--config-settings=cmake.define.CUDA_TOOLKIT_ROOT_DIR=${cudaRoot}",
              "--config-settings=cmake.args=-G Ninja"
            )
          }

          python -m pip wheel . --no-deps -w wheelhouse `
            --config-settings="cmake.define.CMAKE_TOOLCHAIN_FILE=${vcpkgToolchain}" `
            --config-settings="cmake.define.VCPKG_INSTALLED_DIR=${vcpkgInstalled}" `
            --config-settings="cmake.define.CMAKE_PREFIX_PATH=${cmakePrefixPath}" `
            --config-settings="cmake.define.VCPKG_TARGET_TRIPLET=x64-windows" `
            --config-settings="cmake.define.CUDA_ENABLED=OFF" `
            @cudaArgs

      # ==================== Repair Wheel ====================
      - name: Repair wheel with delvewheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: third_party/colmap-for-pycolmap
        run: |
          $vcpkgBin = "${{ github.workspace }}/build/vcpkg_installed/x64-windows/bin"
          $colmapBin = "${{ github.workspace }}/build/install/colmap-for-pycolmap/bin"

          # Build list of paths for delvewheel
          $addPaths = @(
            "--add-path", "$vcpkgBin",
            "--add-path", "$colmapBin"
          )

          # Add CUDA bin path for CUDA builds (contains nvjitlink, cudart, etc.)
          if ("${{ matrix.cuda }}" -eq "true") {
            $cudaRoot = $env:CUDA_PATH
            if (-not $cudaRoot) {
              $versionParts = "${{ matrix.cuda_version }}".Split(".")
              $cudaMajorMinor = "$($versionParts[0]).$($versionParts[1])"
              $cudaRoot = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$cudaMajorMinor"
            }
            $cudaBin = Join-Path $cudaRoot "bin"
            if (-not (Test-Path $cudaBin)) {
              Write-Host "ERROR: CUDA bin path not found at $cudaBin" -ForegroundColor Red
              exit 1
            }
            Write-Host "Adding CUDA bin path: $cudaBin"
            $addPaths += @("--add-path", "$cudaBin")
          }

          # Add cuDSS bin path for cuDSS builds
          if ("${{ matrix.cudss }}" -eq "true" -and $env:CUDSS_ROOT) {
            # cuDSS DLLs are in bin/12 or bin/13 subdirectory
            $cudssSearchDirs = @(
              "$env:CUDSS_ROOT\bin\12",
              "$env:CUDSS_ROOT\bin\13",
              "$env:CUDSS_ROOT\bin"
            )
            foreach ($dir in $cudssSearchDirs) {
              if (Test-Path "$dir\cudss*.dll") {
                Write-Host "Adding cuDSS bin path: $dir"
                $addPaths += @("--add-path", "$dir")
                break
              }
            }
          }

          $wheel = Get-ChildItem -Path wheelhouse -Filter "pycolmap-*.whl" | Select-Object -First 1

          if ($wheel) {
            Write-Host "Repairing wheel: $($wheel.Name)"
            Write-Host "Search paths: $($addPaths -join ' ')"
            $providerDlls = @(
              "onnxruntime_providers_shared.dll",
              "onnxruntime_providers_cuda.dll"
            )
            foreach ($providerDll in $providerDlls) {
              if (-not (Test-Path (Join-Path $colmapBin $providerDll))) {
                Write-Host "ERROR: Missing ONNX Runtime provider $providerDll in $colmapBin" -ForegroundColor Red
                exit 1
              }
            }
            $providerDllList = $providerDlls -join ";"
            $excludeDlls = @(
              "cudart64_12.dll",
              "cublas*.dll",
              "cufft*.dll",
              "curand*.dll",
              "cusolver*.dll",
              "cusparse*.dll",
              "nvJitLink*.dll",
              "nvrtc*.dll",
              "nvToolsExt*.dll",
              "cudnn*.dll",
              "cudss*.dll"
            ) -join ";"
            python -m delvewheel repair -v @addPaths `
              --include $providerDllList `
              --no-mangle $providerDllList `
              --exclude $excludeDlls `
              -w wheelhouse $wheel.FullName

            # Remove original wheel, keep repaired one
            # delvewheel creates a new wheel with the same name
          } else {
            Write-Error "No wheel found to repair!"
            exit 1
          }

      - name: Smoke test pycolmap wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: third_party/colmap-for-pycolmap
        run: |
          $wheel = Get-ChildItem -Path wheelhouse -Filter "pycolmap-*.whl" | Select-Object -First 1

          if (-not $wheel) {
            Write-Host "ERROR: No wheel found in wheelhouse/" -ForegroundColor Red
            exit 1
          }

          Write-Host "Testing wheel: $($wheel.Name)"

          # Install the wheel
          $python = (Get-Command python).Source
          & $python -m pip install $wheel.FullName --force-reinstall --no-cache-dir
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to install repaired pycolmap wheel" -ForegroundColor Red
            exit 1
          }

          # Prove the installed wheel does not fall back to the build toolkit.
          $blockedRoots = @(
            "C:\Program Files\NVIDIA GPU Computing Toolkit",
            "C:\cudss",
            "${{ github.workspace }}\build"
          )
          $cleanPath = @()
          foreach ($entry in ($env:PATH -split ";")) {
            $blocked = $false
            foreach ($root in $blockedRoots) {
              if ($entry.StartsWith($root, [System.StringComparison]::OrdinalIgnoreCase)) {
                $blocked = $true
                break
              }
            }
            if (-not $blocked) {
              $cleanPath += $entry
            }
          }
          $env:PATH = $cleanPath -join ";"
          Remove-Item Env:CUDA_PATH -ErrorAction SilentlyContinue
          Remove-Item Env:CUDA_PATH_V12_8 -ErrorAction SilentlyContinue
          Remove-Item Env:CUDA_PATH_VX_Y -ErrorAction SilentlyContinue
          Remove-Item Env:CUDSS_ROOT -ErrorAction SilentlyContinue
          Remove-Item Env:cudss_DIR -ErrorAction SilentlyContinue

          # Test import and version
          Write-Host "Testing pycolmap import..."
          @'
          import ctypes
          import importlib
          from pathlib import Path

          import pycolmap

          assert len(pycolmap._CUDA_DLL_DIRECTORIES) >= 10
          assert len(pycolmap._CUDA_LIBRARY_HANDLES) >= 19

          loaded_names = {
              Path(handle._name).name.lower()
              for handle in pycolmap._CUDA_LIBRARY_HANDLES
          }
          assert "cudss64_0.dll" in loaded_names, loaded_names
          assert "nvjitlink_120_0.dll" in loaded_names, loaded_names
          assert "nvrtc64_120_0.dll" in loaded_names, loaded_names
          assert "nvrtc64_120_0.alt.dll" not in loaded_names, loaded_names

          def package_root(module_name):
              module = importlib.import_module(module_name)
              if getattr(module, "__file__", None):
                  return Path(module.__file__).parent
              return Path(next(iter(module.__path__)))

          cudnn_ops_path = next(
              (package_root("nvidia.cudnn") / "bin").glob("cudnn_ops*.dll")
          )
          cudnn_ops = ctypes.WinDLL(str(cudnn_ops_path))
          assert cudnn_ops.cudnnCreateFilterDescriptor

          cudss_path = next(
              (package_root("nvidia.cu12") / "bin").glob("cudss64_*.dll")
          )
          ctypes.WinDLL(str(cudss_path))

          libs_dir = Path(pycolmap.__file__).resolve().parent.parent / "pycolmap.libs"
          for provider_name in (
              "onnxruntime_providers_shared.dll",
              "onnxruntime_providers_cuda.dll",
          ):
              provider = libs_dir / provider_name
              assert provider.is_file(), f"missing ONNX Runtime provider: {provider}"

          assert (
              pycolmap.BundleAdjustmentBackend.CASPAR
              == pycolmap.BundleAdjustmentBackend("CASPAR")
          )
          opts = pycolmap.BundleAdjustmentOptions()
          opts.backend = pycolmap.BundleAdjustmentBackend.CASPAR
          assert isinstance(opts.caspar, pycolmap.CasparBundleAdjustmentOptions)
          opts.caspar.gpu_index = "0"
          print(f"pycolmap {pycolmap.__version__} clean-install smoke test passed")
          '@ | & $python -
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: pycolmap clean-install smoke test failed" -ForegroundColor Red
            exit 1
          }

          $alikedHome = Join-Path $env:RUNNER_TEMP "pycolmap-aliked-download-test"
          Remove-Item -Recurse -Force $alikedHome -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $alikedHome | Out-Null
          $env:USERPROFILE = $alikedHome
          & $python "$env:GITHUB_WORKSPACE/.github/scripts/validate_aliked_download.py"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: ALIKED default-model download test failed" -ForegroundColor Red
            exit 1
          }
          Write-Host "pycolmap smoke test passed" -ForegroundColor Green

      # ==================== Artifacts ====================
      - name: Validate exact wheel filename and metadata
        shell: pwsh
        working-directory: third_party/colmap-for-pycolmap
        run: |
          $expected = "pycolmap-4.1.0+cu128.pipcuda.cudss-cp312-cp312-win_amd64.whl"
          $wheels = @(Get-ChildItem -Path wheelhouse -Filter "*.whl")
          if ($wheels.Count -ne 1 -or $wheels[0].Name -ne $expected) {
            Write-Host "ERROR: Expected only $expected; found $($wheels.Name -join ', ')" -ForegroundColor Red
            exit 1
          }
          @'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = Path("wheelhouse/pycolmap-4.1.0+cu128.pipcuda.cudss-cp312-cp312-win_amd64.whl")
          with ZipFile(wheel) as archive:
              metadata_name = next(n for n in archive.namelist() if n.endswith(".dist-info/METADATA"))
              metadata = archive.read(metadata_name).decode()
              names = tuple(archive.namelist())
          assert "\nVersion: 4.1.0+cu128.pipcuda.cudss\n" in f"\n{metadata}"
          required = (
              "nvidia-cuda-runtime-cu12",
              "nvidia-cublas-cu12",
              "nvidia-cufft-cu12",
              "nvidia-curand-cu12",
              "nvidia-cusolver-cu12",
              "nvidia-cusparse-cu12",
              "nvidia-nvjitlink-cu12",
              "nvidia-cuda-nvrtc-cu12",
              "nvidia-nvtx-cu12",
              "nvidia-cudnn-cu12",
              "nvidia-cudss-cu12",
          )
          for requirement in required:
              assert f"Requires-Dist: {requirement}" in metadata, requirement
          forbidden = (
              "cudart", "cublas", "cufft", "curand", "cusolver", "cusparse",
              "nvjitlink", "nvrtc", "nvtoolsext", "cudnn", "cudss",
          )
          embedded = [
              name for name in names
              if name.lower().endswith(".dll")
              and any(token in Path(name).name.lower() for token in forbidden)
          ]
          assert not embedded, f"NVIDIA DLLs remain embedded: {embedded}"
          for provider_name in (
              "onnxruntime_providers_shared.dll",
              "onnxruntime_providers_cuda.dll",
          ):
              matches = [name for name in names if Path(name).name == provider_name]
              assert len(matches) == 1, (provider_name, matches)
          print(f"Validated {wheel.name} and its METADATA version")
          '@ | python -

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycolmap-windows-cp312-cu128
          path: third_party/colmap-for-pycolmap/wheelhouse/*.whl
          retention-days: 7
          if-no-files-found: error
