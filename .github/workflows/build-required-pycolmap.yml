name: Build Required pycolmap Wheel Subset

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create and publish after all wheels pass
        required: true
        type: string
        default: pycolmap-4.1.0-cu128-cudss-r3

permissions:
  contents: write

jobs:
  validate-release-tag:
    runs-on: ubuntu-24.04
    steps:
      - name: Require a new release tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
             gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "ERROR: Release tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

  linux-wheels:
    needs: validate-release-tag
    uses: ./.github/workflows/build-custom-pycolmap.yml
    with:
      python_version: '3.12'
      cuda_version: '12.8'
      manylinux_tag: manylinux_2_34_x86_64
      cudss: true
      bundle_cuda: false
      release_tag: ''
    secrets: inherit

  windows-wheel:
    needs: validate-release-tag
    uses: ./.github/workflows/build-pycolmap.yml
    with:
      release_tag: ''
    secrets: inherit

  publish-release:
    needs: [linux-wheels, windows-wheel]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Download validated wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-wheelhouse
          merge-multiple: true

      - name: Pin released wheels
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python scripts/update_release_wheels.py \
            --release-tag "$RELEASE_TAG" \
            --wheel-dir release-wheelhouse
          python -m unittest discover tests

      - name: Publish redirect manifest to master
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add release_wheels.json
          if git diff --cached --quiet; then
            echo "Release wheel manifest is already current"
          else
            git commit -m "Point installs at ${{ inputs.release_tag }}"
            git push origin HEAD:master
          fi

      - name: Create and publish the latest release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release create "$RELEASE_TAG" release-wheelhouse/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$(git rev-parse HEAD)" \
            --title "pycolmap 4.1.0 CUDA 12.8 + cuDSS wheels" \
            --notes "CUDA 12.8.1, cuDNN 9.10.2, and cuDSS 0.7.1 runtimes install automatically as pinned Python dependencies." \
            --latest
