name: Build Custom pycolmap Wheel

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
      cuda_version:
        required: true
        type: string
      manylinux_tag:
        required: true
        type: string
      cudss:
        required: true
        type: boolean
      bundle_cuda:
        required: true
        type: boolean
      release_tag:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version
        required: true
        type: choice
        default: '3.12'
        options:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
      cuda_version:
        description: CUDA major.minor release family
        required: true
        type: choice
        default: '12.8'
        options:
          - '12.8'
          - '13.0'
          - '13.1'
      manylinux_tag:
        description: Oldest supported glibc baseline
        required: true
        type: choice
        default: manylinux_2_34_x86_64
        options:
          - manylinux_2_34_x86_64
          - manylinux_2_28_x86_64
      cudss:
        description: Include NVIDIA cuDSS sparse solver support
        required: true
        type: boolean
        default: true
      bundle_cuda:
        description: Bundle CUDA and cuDSS runtime libraries into the wheel
        required: true
        type: boolean
        default: false
      release_tag:
        description: Optional existing release tag to receive the wheel
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: custom-pycolmap-${{ inputs.python_version }}-${{ inputs.cuda_version }}-${{ inputs.manylinux_tag }}-${{ inputs.cudss }}-${{ inputs.bundle_cuda }}
  cancel-in-progress: false

jobs:
  build-wheel:
    name: py${{ inputs.python_version }} CUDA ${{ inputs.cuda_version }} ${{ inputs.manylinux_tag }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository and pinned submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free runner disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift
          sudo apt-get clean
          docker system prune --all --force
          df -h

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/vcpkg
          key: vcpkg-${{ inputs.cuda_version }}-${{ inputs.manylinux_tag }}-${{ hashFiles('vcpkg.json', 'overlay-ports/**', 'patches/**') }}
          restore-keys: |
            vcpkg-${{ inputs.cuda_version }}-${{ inputs.manylinux_tag }}-

      - name: Build in the selected PyPA manylinux container
        env:
          PYTHON_VERSION: ${{ inputs.python_version }}
          CUDA_VERSION: ${{ inputs.cuda_version }}
          MANYLINUX_TAG: ${{ inputs.manylinux_tag }}
          WITH_CUDSS: ${{ inputs.cudss }}
          BUNDLE_CUDA: ${{ inputs.bundle_cuda }}
          VCPKG_BINARY_SOURCES: clear;files,/workspace/.cache/vcpkg,readwrite
        run: |
          image="quay.io/pypa/${MANYLINUX_TAG}"
          docker pull "$image"
          docker run --rm --shm-size=2g \
            --env PYTHON_VERSION \
            --env CUDA_VERSION \
            --env MANYLINUX_TAG \
            --env WITH_CUDSS \
            --env BUNDLE_CUDA \
            --env VCPKG_BINARY_SOURCES \
            --env GITHUB_SHA \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "$image" \
            bash .github/scripts/build_custom_manylinux_wheel.sh

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/vcpkg
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: List validated outputs
        run: |
          ls -lh custom-wheelhouse
          {
            echo '### Custom pycolmap wheel'
            echo
            echo '```text'
            find custom-wheelhouse -maxdepth 1 -type f -printf '%f\n' | sort
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow artifact
        if: inputs.release_tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: pycolmap-py${{ inputs.python_version }}-cu${{ inputs.cuda_version }}-${{ inputs.manylinux_tag }}
          path: |
            custom-wheelhouse/*.whl
            custom-wheelhouse/*.build_info.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload to an existing release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" custom-wheelhouse/* --clobber
